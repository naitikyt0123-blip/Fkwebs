<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f3f6; }
    </style>
</head>
<body class="bg-gray-100">

    <header class="bg-white text-black sticky top-0 z-50 p-3 flex items-center gap-4 shadow-sm">
        <a href="address.html" class="text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        </a>
        <span class="font-semibold text-base">Order Summary</span>
    </header>

    <div class="px-6 py-4 bg-white">
        </div>
    
    <main id="main-content" class="bg-gray-100 p-2 space-y-3 pb-24">
        <div class="bg-white p-4 rounded-md shadow-sm">
            <h3 class="font-bold text-gray-800">Delivered to:</h3>
            <p class="text-sm text-gray-600 mt-1">Your saved address will appear here.</p>
        </div>
        <div class="bg-white p-4 rounded-md shadow-sm">
            <div class="flex gap-4">
                <img id="product-image" src="" class="w-16 h-16 object-contain border rounded-md p-1 bg-gray-200 animate-pulse">
                <div>
                    <p id="product-title" class="text-sm text-gray-800 leading-tight"></p>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-xs text-gray-500">Qty: 1</span>
                        <p id="product-price" class="text-sm font-bold text-gray-900"></p>
                    </div>
                </div>
            </div>
        </div>
        <div class="bg-white p-4 rounded-md shadow-sm">
            <h3 class="font-bold text-gray-500 border-b pb-2 mb-3">Price Details</h3>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between"><span>Price (1 item)</span><span id="price-mrp">₹--</span></div>
                <div class="flex justify-between"><span>Discount</span><span id="price-discount" class="text-green-600">- ₹--</span></div>
                <div class="flex justify-between"><span>Delivery Charges</span><span class="text-green-600">FREE Delivery</span></div>
            </div>
            <div class="flex justify-between font-bold border-t border-dashed mt-4 pt-4"><span>Total Amount</span><span id="price-total">₹--</span></div>
        </div>
        <div class="bg-green-50 p-3 rounded-md text-center">
            <p id="savings-message" class="text-sm font-semibold text-green-700"></p>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 z-10 flex justify-between items-center">
        <div>
            <p class="text-xs text-gray-500 line-through" id="footer-original-price"></p>
            <p class="text-lg font-bold" id="footer-total-price">₹--</p>
        </div>
        <a href="payment.html" class="bg-orange-500 text-white font-bold py-3 px-12 rounded-md">Continue</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        // Fetch config from firesdk.php for consistency
        async function getConfig() {
            const cached = sessionStorage.getItem('fk_config');
            if (cached) return JSON.parse(cached);
            const res = await fetch('firesdk.php');
            if (!res.ok) throw new Error('Config load failed (firesdk.php).');
            const cfg = await res.json();
            sessionStorage.setItem('fk_config', JSON.stringify(cfg));
            return cfg;
        }

        const mainContent = document.getElementById('main-content');
        const productId = sessionStorage.getItem('productId');

        async function loadOrderSummary() {
            if (!productId) {
                mainContent.innerHTML = `<p class="text-center p-8 bg-white rounded-lg shadow-md font-bold text-red-500">Could not find product details. Please go back to the product page and try again.</p>`;
                return;
            }

            try {
                // Initialize Firebase dynamically
                const cfg = await getConfig();
                const app = initializeApp(cfg.firebase);
                const db = getFirestore(app);

                // Fetch product from dynamic collection
                const productRef = doc(db, cfg.collection, productId);
                const docSnap = await getDoc(productRef);

                if (docSnap.exists()) {
                    const product = docSnap.data();
                    const discountAmount = product.originalPrice - product.price;

                    const productImageEl = document.getElementById('product-image');
                    productImageEl.src = product.homeImage;
                    productImageEl.classList.remove('bg-gray-200', 'animate-pulse');
                    
                    document.getElementById('product-title').textContent = product.title;
                    document.getElementById('product-price').textContent = `₹${product.price}`;
                    document.getElementById('price-mrp').textContent = `₹${product.originalPrice}`;
                    document.getElementById('price-discount').textContent = `- ₹${discountAmount}`;
                    document.getElementById('price-total').textContent = `₹${product.price}`;
                    document.getElementById('savings-message').textContent = `You will save ₹${discountAmount} on this order`;
                    document.getElementById('footer-original-price').textContent = `₹${product.originalPrice}`;
                    document.getElementById('footer-total-price').textContent = `₹${product.price}`;
                } else { throw new Error("Product not found in the database."); }

            } catch (error) {
                console.error("Error fetching order summary:", error);
                mainContent.innerHTML = `<p class="text-center p-8 bg-white rounded-lg shadow-md font-bold text-red-500">Error: ${error.message}</p>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadOrderSummary);
    </script>
</body>
</html>
