    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f3f6; }
        .slider-container { position: relative; overflow: hidden; border-radius: 0.375rem; }
        .slider-wrapper { display: flex; transition: transform 0.5s ease-in-out; }
        .slider-slide { flex-shrink: 0; width: 100%; }
        .slider-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
        .slider-dot { width: 8px; height: 8px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.5); cursor: pointer; transition: background-color 0.3s; }
        .slider-dot.active { background-color: white; }
        #search-suggestions { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100">

    <header class="bg-[#2874f0] text-white">
        <div class="flex items-center gap-2 px-3 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            <img src="asset/flipkart_logo.png" alt="Flipkart Logo" class="h-6">
            <div class="relative flex-grow">
                <input type="text" id="search-input" placeholder="Search for Products, Brands and More" class="w-full bg-white text-black text-sm rounded-md py-2 pl-4 pr-10 focus:outline-none">
                <button id="search-btn" class="absolute right-0 top-0 h-full px-3 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
                </button>
                <div id="search-suggestions" class="absolute top-full left-0 right-0 bg-white text-black rounded-b-md shadow-lg border-t border-gray-200 hidden z-50"></div>
            </div>
            <div id="auth-section" class="flex items-center gap-4 text-sm font-semibold">
                 <a href="login.html" class="flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" /></svg>
                    <span>Login</span>
                </a>
            </div>
             <a href="cart.html" class="flex items-center gap-1 ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                 <span class="text-sm font-semibold">Cart</span>
            </a>
        </div>
        <div class="bg-white shadow-md">
            <img src="asset/fashion.png" alt="Product Categories" class="w-full" loading="lazy">
        </div>
    </header>

    <main class="container mx-auto pb-16">
        <div class="p-1">
            <div class="slider-container">
                <div id="slider-wrapper" class="slider-wrapper">
                    <img src="asset/sale-banner.png" alt="Big End of Season Sale" class="slider-slide">
                    <img src="asset/live_now.png" alt="Live Now Sale" class="slider-slide" loading="lazy">
                    <img src="asset/realme_mobile.png" alt="Realme Mobile Offer" class="slider-slide" loading="lazy">
                    <img src="asset/perfume.png" alt="Perfume Deals" class="slider-slide" loading="lazy">
                </div>
                <div id="slider-dots" class="slider-dots"></div>
            </div>
        </div>

        <div class="flex justify-between items-center px-4 py-2 mt-2">
            <h2 class="text-lg font-bold text-gray-800">Deals of the Day</h2>
            <div class="flex items-center space-x-2">
                <span id="countdown-timer" class="text-sm text-gray-500 font-bold">10:00</span>
                <span class="bg-red-500 text-white text-xs font-bold px-2 py-1 rounded">SALE IS LIVE</span>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-2 gap-1.5 p-1.5">
            <!-- Skeleton loaders JS se turant lag jayenge -->
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2">
        <!-- Footer buttons... -->
    </footer>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const productGrid = document.getElementById('product-grid');
        let allProducts = [];
        let dealsTimerInterval;
        let sliderInterval;

        // ---- Skeleton turant dikhao (khaali screen na dikhe) ----
        function showSkeletons() {
            productGrid.innerHTML = Array(8).fill(
                '<div class="bg-white rounded-md shadow p-2 flex flex-col animate-pulse">' +
                '<div class="w-full h-32 bg-gray-200 rounded mb-2"></div>' +
                '<div class="h-4 bg-gray-200 rounded w-5/6 mb-2"></div>' +
                '<div class="h-3 bg-gray-200 rounded w-1/2 mb-2"></div>' +
                '<div class="h-5 bg-gray-200 rounded w-1/3"></div></div>'
            ).join('');
        }
        showSkeletons();

        // ---- Config firesdk.php se lao (cache karo -> fast) ----
        async function getConfig() {
            const cached = sessionStorage.getItem('fk_config');
            if (cached) return JSON.parse(cached);
            const res = await fetch('firesdk.php');
            if (!res.ok) throw new Error('Config load nahi hua (firesdk.php).');
            const cfg = await res.json();
            sessionStorage.setItem('fk_config', JSON.stringify(cfg));
            return cfg;
        }

        function truncateTitle(title, wordLimit) {
            const words = title.split(' ');
            if (words.length > wordLimit) {
                return words.slice(0, wordLimit).join(' ') + '...';
            }
            return title;
        }

        function renderProducts(productsToDisplay) {
            if (productsToDisplay.length === 0) {
                 productGrid.innerHTML = '<p class="col-span-2 text-center font-semibold p-4">No products found. Add some from the Admin Panel.</p>';
                 return;
            }
            const html = productsToDisplay.map(({ product, id }) => `
                <a href="product.html?id=${id}" class="bg-white rounded-md shadow p-2 flex flex-col hover:shadow-lg transition-shadow">
                    <img src="${product.homeImage}" alt="${product.title}" class="w-full h-32 object-contain mb-2" loading="lazy">
                    <p class="text-xs text-gray-700 leading-tight flex-grow">${truncateTitle(product.title, 7)}</p>
                    <div class="mt-2">
                        <span class="text-green-600 text-xs font-semibold">${product.discount}</span>
                        <span class="text-gray-400 line-through text-xs">₹${product.originalPrice}</span>
                    </div>
                    <div class="flex items-center justify-between mt-1">
                        <p class="text-sm font-bold">₹${product.price}</p>
                        <img src="asset/assured_logo.png" alt="Assured" class="h-4" loading="lazy">
                    </div>
                </a>
            `).join('');
            productGrid.innerHTML = html;
        }

        async function loadProducts() {
            try {
                const cfg = await getConfig();
                const app = initializeApp(cfg.firebase);
                const db = getFirestore(app);

                // Collection ka naam firesdk.php se aata hai
                const productsRef = collection(db, cfg.collection);
                const querySnapshot = await getDocs(query(productsRef));

                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, product: doc.data() });
                });

                // Naye product upar (crash-safe sorting)
                allProducts.sort((a, b) => {
                    const timeA = a.product.createdAt?.seconds || 0;
                    const timeB = b.product.createdAt?.seconds || 0;
                    return timeB - timeA;
                });

                renderProducts(allProducts);
            } catch (error) {
                console.error("Error fetching products: ", error);
                productGrid.innerHTML = '<p class="col-span-2 text-red-500 text-center">Could not load products. Please check firesdk.php & Firebase Security Rules.</p>';
            }
        }

        function startDealsTimer() {
             clearInterval(dealsTimerInterval);
            const countdownTimer = document.getElementById('countdown-timer');
            if(!countdownTimer) return;
            let timeLeft = 600;
            dealsTimerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(dealsTimerInterval);
                    countdownTimer.textContent = "00:00";
                    return;
                }
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                countdownTimer.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function startBannerSlider() { /* ... same as before ... */ }

        function initializePage() {
            loadProducts();      // sabse pehle products (fast)
            startDealsTimer();
            startBannerSlider();
        }

        // DOM already ready ho to turant chalao warna wait karo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializePage);
        } else {
            initializePage();
        }
    </script>
</body>
</html>
