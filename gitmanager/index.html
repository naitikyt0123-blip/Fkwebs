<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>GitHub File Manager</title>
<style>
/* ============================================================
   Clean cPanel-style UI. No glow, no neon, no glassmorphism.
   Mobile responsive.
   ============================================================ */
:root{
  --bg:#f4f5f7; --surface:#fff; --surface-2:#fafbfc; --border:#e1e4e8;
  --border-2:#d0d5da; --text:#24292f; --text-soft:#57606a; --text-mute:#8a919a;
  --primary:#2563eb; --primary-d:#1d4ed8; --danger:#d1242f; --danger-d:#b31d27;
  --ok:#1a7f37; --radius:8px; --shadow:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.05);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* Buttons */
.btn{border:1px solid var(--border-2);background:var(--surface);color:var(--text);padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:background .12s,border-color .12s}
.btn:hover{background:var(--surface-2);border-color:var(--text-mute)}
.btn:active{background:#eef0f2}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-d);border-color:var(--primary-d)}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn-danger:hover{background:var(--danger-d)}
.btn-block{width:100%;text-align:center}
.btn-sm{padding:5px 9px;font-size:12px}
.icon-btn{border:none;background:transparent;color:var(--text-soft);width:38px;height:38px;border-radius:var(--radius);font-size:18px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.icon-btn:hover{background:rgba(0,0,0,.06);color:var(--text)}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 28px;box-shadow:var(--shadow);text-align:center}
.login-logo{width:56px;height:56px;margin:0 auto 14px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:20px;display:flex;align-items:center;justify-content:center}
.login-card h1{font-size:20px;margin-bottom:2px}
.login-sub{color:var(--text-mute);margin-bottom:22px;font-size:13px}
.login-card label{display:block;text-align:left;font-size:12px;font-weight:600;color:var(--text-soft);margin:12px 0 5px}
.login-card input{width:100%;padding:10px 12px;border:1px solid var(--border-2);border-radius:var(--radius);font-size:14px;background:var(--surface-2)}
.login-card input:focus{outline:none;border-color:var(--primary);background:#fff}
.login-card .btn{margin-top:20px;padding:11px}
.login-error{color:var(--danger);font-size:12px;margin-top:12px;min-height:16px}

/* App shell */
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 10px;position:sticky;top:0;z-index:30}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:2px}
.brand{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
.brand-mark{background:var(--primary);color:#fff;font-size:11px;font-weight:700;padding:3px 6px;border-radius:5px}
.user-chip{font-size:12px;color:var(--text-mute);margin-left:6px}
.menu-toggle{display:none}
.layout{flex:1;display:flex;position:relative}

/* Sidebar */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:4px}
.side-title{font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.5px;padding:6px 12px 2px}
.side-item{text-align:left;border:none;background:transparent;color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:13.5px;font-weight:500}
.side-item:hover{background:var(--surface-2)}
.side-item.active{background:#eaf0ff;color:var(--primary-d)}
.repo-list{overflow:auto;display:flex;flex-direction:column;gap:2px;margin-top:4px}
.repo-btn{display:flex;align-items:center;gap:8px;justify-content:space-between}
.repo-btn .lock{font-size:11px;color:var(--text-mute)}
.backdrop{display:none}

/* Content */
.content{flex:1;padding:16px;min-width:0}
.toolbar{margin-bottom:12px}
.breadcrumb{display:flex;flex-wrap:wrap;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--border);padding:8px 12px;border-radius:var(--radius);font-size:13px}
.breadcrumb a{color:var(--primary);text-decoration:none;padding:2px 4px;border-radius:4px}
.breadcrumb a:hover{background:var(--surface-2)}
.breadcrumb .sep{color:var(--text-mute);margin:0 2px}
.breadcrumb .cur{color:var(--text);font-weight:600;padding:2px 4px}
.quickbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}

/* Empty / repos landing */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;text-align:center;box-shadow:var(--shadow)}
.hero h2{font-size:17px;margin-bottom:6px}
.hero p{color:var(--text-mute);margin-bottom:16px}

/* File table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.file-table{width:100%;border-collapse:collapse}
.file-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-mute);font-weight:600;padding:10px 14px;background:var(--surface-2);border-bottom:1px solid var(--border)}
.file-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.file-table tr:last-child td{border-bottom:none}
.file-table tbody tr:hover{background:var(--surface-2)}
.col-size{width:110px}
.col-act{width:190px;text-align:right}
.fname{display:flex;align-items:center;gap:10px;cursor:pointer}
.fname .ico{font-size:16px;width:20px;text-align:center}
.fname .txt{font-weight:500;word-break:break-all}
.fname:hover .txt{color:var(--primary)}
.muted{color:var(--text-mute);font-size:12.5px}
.row-actions{display:flex;gap:4px;justify-content:flex-end}
.empty{padding:40px;text-align:center;color:var(--text-mute)}

/* Modals */
.modal{position:fixed;inset:0;background:rgba(20,24,28,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal-box{background:var(--surface);border-radius:12px;width:100%;max-width:440px;box-shadow:0 12px 40px rgba(0,0,0,.22);display:flex;flex-direction:column;max-height:90vh;overflow:hidden}
.modal-lg{max-width:820px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600;font-size:15px}
.modal-body{padding:18px;overflow:auto}
.modal-foot{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px}
.field input[type=text],.field input[type=password]{width:100%;padding:10px 12px;border:1px solid var(--border-2);border-radius:var(--radius);font-size:14px}
.field input:focus{outline:none;border-color:var(--primary)}
.check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-soft)}
#editorArea{width:100%;min-height:52vh;border:1px solid var(--border-2);border-radius:var(--radius);padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.6;resize:vertical;background:var(--surface-2)}
#editorArea:focus{outline:none;border-color:var(--primary);background:#fff}
.preview-body{text-align:center}
.preview-body img{max-width:100%;border-radius:var(--radius)}

/* Toast + loading */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--radius);font-size:13.5px;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:90vw}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--danger)}
.loading-bar{position:fixed;top:0;left:0;height:3px;width:100%;z-index:90;background:linear-gradient(90deg,var(--primary),var(--primary) 40%,transparent 40%);background-size:250% 100%;animation:load 1s linear infinite}
@keyframes load{0%{background-position:150% 0}100%{background-position:-150% 0}}

/* Mobile */
@media (max-width:768px){
  .menu-toggle{display:inline-flex}
  .sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .22s ease;box-shadow:2px 0 16px rgba(0,0,0,.18)}
  .sidebar.open{transform:translateX(0)}
  .backdrop.show{display:block;position:fixed;inset:52px 0 0 0;background:rgba(0,0,0,.35);z-index:35}
  .content{padding:12px}
  .file-table thead{display:none}
  .file-table,.file-table tbody,.file-table tr,.file-table td{display:block;width:100%}
  .file-table tr{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;padding:6px 4px;background:var(--surface)}
  .file-table td{border:none;padding:6px 12px}
  .col-size{display:inline-block!important;width:auto}
  .col-size::before{content:"Size: ";color:var(--text-mute)}
  .col-act{text-align:left;width:100%}
  .row-actions{justify-content:flex-start;flex-wrap:wrap;margin-top:4px}
  .table-wrap{border:none;background:transparent;box-shadow:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
  <form id="loginForm" class="login-card">
    <div class="login-logo">GH</div>
    <h1>GitHub File Manager</h1>
    <p class="login-sub">Login to continue</p>
    <label>Username</label>
    <input type="text" id="loginUser" autocomplete="username" required />
    <label>Password</label>
    <input type="password" id="loginPass" autocomplete="current-password" required />
    <button type="submit" class="btn btn-primary btn-block">Login</button>
    <div id="loginError" class="login-error"></div>
  </form>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn menu-toggle" id="menuToggle">&#9776;</button>
      <span class="brand"><span class="brand-mark">GH</span> File Manager
        <span class="user-chip" id="userChip"></span></span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="refreshBtn" title="Refresh">&#8635;</button>
      <button class="icon-btn" id="logoutBtn" title="Logout">&#10148;</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <button class="side-item" data-act="newRepo">＋ New Repository</button>
      <button class="side-item" data-act="allRepos">📚 All Repositories</button>
      <div class="side-title">Repositories</div>
      <div class="repo-list" id="repoList"></div>
    </aside>
    <div class="backdrop" id="backdrop"></div>

    <main class="content">
      <div class="toolbar"><nav class="breadcrumb" id="breadcrumb"></nav></div>

      <!-- Repos landing -->
      <div id="reposView">
        <div class="hero">
          <h2>Select a repository</h2>
          <p>Left sidebar se koi repository choose karo, ya nayi banao.</p>
          <button class="btn btn-primary" data-act="newRepo">＋ Create Repository</button>
        </div>
        <div class="table-wrap" style="margin-top:16px">
          <table class="file-table">
            <thead><tr><th>Repository</th><th class="col-size">Type</th><th class="col-act">Actions</th></tr></thead>
            <tbody id="repoTable"></tbody>
          </table>
        </div>
      </div>

      <!-- File browser -->
      <div id="filesView" class="hidden">
        <div class="quickbar">
          <button class="btn" data-act="newFolder">+ Folder</button>
          <button class="btn" data-act="newFile">+ File</button>
          <button class="btn" data-act="upload">Upload</button>
          <button class="btn" data-act="uploadZip">ZIP (auto-extract)</button>
        </div>
        <div class="table-wrap">
          <table class="file-table">
            <thead><tr><th class="col-name">Name</th><th class="col-size">Size</th><th class="col-act">Actions</th></tr></thead>
            <tbody id="fileList"></tbody>
          </table>
          <div id="emptyState" class="empty hidden">This folder is empty.</div>
        </div>
      </div>
    </main>
  </div>
</div>

<input type="file" id="fileInput" multiple hidden />
<input type="file" id="zipInput" accept=".zip" hidden />

<!-- Editor modal -->
<div class="modal hidden" id="editorModal">
  <div class="modal-box modal-lg">
    <div class="modal-head"><span id="editorTitle">Edit File</span><button class="icon-btn" data-close>&times;</button></div>
    <div class="modal-body"><textarea id="editorArea" spellcheck="false"></textarea></div>
    <div class="modal-foot"><button class="btn" data-close>Cancel</button><button class="btn btn-primary" id="saveFileBtn">Commit changes</button></div>
  </div>
</div>

<!-- Preview modal -->
<div class="modal hidden" id="previewModal">
  <div class="modal-box modal-lg">
    <div class="modal-head"><span id="previewTitle">Preview</span><button class="icon-btn" data-close>&times;</button></div>
    <div class="modal-body preview-body" id="previewBody"></div>
  </div>
</div>

<!-- New repo modal -->
<div class="modal hidden" id="repoModal">
  <div class="modal-box">
    <div class="modal-head"><span>New Repository</span><button class="icon-btn" data-close>&times;</button></div>
    <div class="modal-body">
      <div class="field"><label>Repository name</label><input type="text" id="repoName" placeholder="my-project" /></div>
      <label class="check"><input type="checkbox" id="repoPrivate" /> Private repository</label>
    </div>
    <div class="modal-foot"><button class="btn" data-close>Cancel</button><button class="btn btn-primary" id="repoCreateBtn">Create</button></div>
  </div>
</div>

<!-- Prompt modal -->
<div class="modal hidden" id="promptModal">
  <div class="modal-box">
    <div class="modal-head"><span id="promptTitle">Enter value</span><button class="icon-btn" data-close>&times;</button></div>
    <div class="modal-body"><div class="field"><input type="text" id="promptInput" /></div></div>
    <div class="modal-foot"><button class="btn" data-close>Cancel</button><button class="btn btn-primary" id="promptOk">OK</button></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<div id="loadingBar" class="loading-bar hidden"></div>

<script src="/app.js"></script>
</body>
</html>
