    <style>
        body { font-family: 'Inter', sans-serif; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        #sidebar-overlay { transition: opacity 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .nav-link.active { background: linear-gradient(90deg,#2563eb,#3b82f6); color: white; box-shadow: 0 4px 12px rgba(37,99,235,.35); }
        .card { background:#fff; border-radius:1rem; box-shadow:0 10px 30px -12px rgba(0,0,0,.15); }
        .field { transition: box-shadow .2s, border-color .2s; }
        .field:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.25); }
        .file-drop { border:2px dashed #cbd5e1; border-radius:.75rem; transition:.2s; cursor:pointer; }
        .file-drop:hover { border-color:#3b82f6; background:#f8fafc; }
        .btn-primary { background:linear-gradient(90deg,#2563eb,#3b82f6); }
        .btn-primary:hover { box-shadow:0 8px 20px -6px rgba(37,99,235,.6); transform:translateY(-1px); }
        .btn-primary { transition:.2s; }
        /* toast */
        #toast { transition:opacity .3s, transform .3s; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #3b82f6; } }
        #welcome-text { overflow:hidden; white-space:nowrap; animation: typing 3s steps(40,end), blink-caret .75s step-end infinite; border-right:.15em solid #3b82f6; max-width:100%; }
    </style>
</head>
<body class="bg-slate-100">

    <!-- Toast -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 opacity-0 pointer-events-none px-5 py-3 rounded-xl text-white font-semibold shadow-lg"></div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden"></div>

    <div class="relative min-h-screen md:flex">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="bg-slate-900 text-slate-100 w-64 py-6 px-3 absolute inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-40 flex flex-col">
            <div class="flex items-center justify-between px-2 mb-6">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                    <span class="text-xl font-extrabold">Fungus Admin</span>
                </div>
                <button id="close-menu-btn" class="md:hidden p-1 rounded hover:bg-slate-700">
                     <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <!-- Active store badge -->
            <div class="mx-2 mb-4 px-3 py-2 rounded-lg bg-slate-800 text-xs">
                <span class="text-slate-400">Active Store:</span>
                <span id="store-badge" class="font-bold text-blue-300">…</span>
            </div>

            <nav class="space-y-1">
                <a href="#" id="nav-add-product" class="nav-link flex items-center gap-3 py-2.5 px-4 rounded-lg transition hover:bg-slate-700">
                     <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span>Add Product</span>
                </a>
                <a href="#" id="nav-manage-products" class="nav-link flex items-center gap-3 py-2.5 px-4 rounded-lg transition hover:bg-slate-700">
                     <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                    <span>Manage Products</span>
                </a>
                <a href="#" id="nav-payment-settings" class="nav-link flex items-center gap-3 py-2.5 px-4 rounded-lg transition hover:bg-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>
                    <span>QR &amp; UPI Settings</span>
                </a>
            </nav>
        </aside>

        <!-- MAIN -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="bg-white shadow-sm p-4 flex items-center gap-3 sticky top-0 z-20">
                <button id="menu-btn" class="text-slate-600 md:hidden p-1 rounded hover:bg-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <h1 id="page-title" class="text-xl md:text-2xl font-bold text-slate-800">Welcome</h1>
            </header>

            <main class="flex-1 p-4 md:p-6">
                <!-- WELCOME -->
                <section id="welcome-section">
                    <div class="card p-6 md:p-10 text-center">
                        <h1 id="welcome-text" class="text-2xl md:text-4xl font-bold inline-block mx-auto">Welcome to Fungus Admin</h1>
                        <p class="mt-4 text-slate-500">Select an option from the menu to get started.</p>
                    </div>
                </section>

                <!-- ADD PRODUCT -->
                <section id="add-product-section" class="hidden">
                    <form id="add-product-form" class="card p-5 md:p-7 max-w-3xl mx-auto">
                        <h2 class="text-lg font-bold text-slate-800 mb-5">Add New Product</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Product Title</label>
                                <input id="title" type="text" placeholder="e.g. Realme Narzo 60" class="field w-full p-3 border border-slate-300 rounded-lg" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Selling Price (₹)</label>
                                <input id="price" type="number" placeholder="e.g. 499" class="field w-full p-3 border border-slate-300 rounded-lg" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Original Price (₹)</label>
                                <input id="originalPrice" type="number" placeholder="e.g. 1999" class="field w-full p-3 border border-slate-300 rounded-lg" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Discount Text</label>
                                <input id="discount" type="text" placeholder="e.g. 90% off" class="field w-full p-3 border border-slate-300 rounded-lg" required>
                            </div>
                        </div>

                        <div class="mt-5 grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-2">Home Image <span class="text-slate-400 font-normal">(1 image — main page)</span></label>
                                <label class="file-drop flex items-center justify-center gap-2 p-4 text-slate-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.9A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                                    <span id="homeImage-text">Tap to choose home image</span>
                                    <input id="homeImage" type="file" class="hidden" required accept="image/*">
                                </label>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-2">Feature Images <span class="text-slate-400 font-normal">(product slider)</span></label>
                                <label class="file-drop flex items-center justify-center gap-2 p-4 text-slate-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    <span id="featureImages-text">Tap to choose multiple images</span>
                                    <input id="featureImages" type="file" class="hidden" required multiple accept="image/*">
                                </label>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-2">Feedback Images <span class="text-slate-400 font-normal">(reviews — optional)</span></label>
                                <label class="file-drop flex items-center justify-center gap-2 p-4 text-slate-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                                    <span id="feedbackImages-text">Tap to choose multiple images</span>
                                    <input id="feedbackImages" type="file" class="hidden" multiple accept="image/*">
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary mt-7 w-full text-white font-bold py-3 px-4 rounded-lg">Save Product</button>
                    </form>
                </section>

                <!-- MANAGE -->
                <section id="manage-products-section" class="hidden">
                    <div class="card p-4 md:p-6">
                        <div id="product-list" class="space-y-3"><p class="text-slate-500">Loading products…</p></div>
                    </div>
                </section>

                <!-- PAYMENT -->
                <section id="payment-settings-section" class="hidden">
                    <form id="payment-settings-form" class="card p-5 md:p-7 max-w-lg mx-auto">
                        <h2 class="text-lg font-bold text-slate-800 mb-5">QR &amp; UPI Settings</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Payee Name</label>
                                <input id="payeeName" type="text" placeholder="e.g. FLIPKART EKART" class="field w-full p-3 border border-slate-300 rounded-lg" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">UPI ID</label>
                                <input id="upiId" type="text" placeholder="e.g. paytm.s12x634@pty" class="field w-full p-3 border border-slate-300 rounded-lg" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Transaction Reference (TR Code)</label>
                                <input id="trCode" type="text" placeholder="TR Code" class="field w-full p-3 border border-slate-300 rounded-lg" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary mt-7 w-full text-white font-bold py-3 px-4 rounded-lg">Save Payment Settings</button>
                    </form>
                </section>
            </main>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, getDoc, setDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        // --- Cloudinary (image upload) ---
        const CLOUDINARY_CLOUD_NAME = "dz7l2s7pj";
        const CLOUDINARY_UPLOAD_PRESET = "flipkart_own";

        // --- Toast helper ---
        function toast(msg, ok = true) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = ok ? '#16a34a' : '#dc2626';
            t.style.opacity = '1';
            t.style.transform = 'translate(-50%, 8px)';
            t.style.pointerEvents = 'auto';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%,0)'; t.style.pointerEvents = 'none'; }, 2600);
        }

        // --- Config firesdk.php se lao (cache -> fast) ---
        async function getConfig() {
            const cached = sessionStorage.getItem('fk_config');
            if (cached) return JSON.parse(cached);
            const res = await fetch('firesdk.php');
            if (!res.ok) throw new Error('firesdk.php load nahi hua');
            const cfg = await res.json();
            sessionStorage.setItem('fk_config', JSON.stringify(cfg));
            return cfg;
        }

        // --- DOM ---
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const sections = { welcome: document.getElementById('welcome-section'), addProduct: document.getElementById('add-product-section'), manageProducts: document.getElementById('manage-products-section'), paymentSettings: document.getElementById('payment-settings-section') };
        const pageTitle = document.getElementById('page-title');
        const navLinks = { addProduct: document.getElementById('nav-add-product'), manageProducts: document.getElementById('nav-manage-products'), paymentSettings: document.getElementById('nav-payment-settings') };
        const productForm = document.getElementById('add-product-form');
        const paymentForm = document.getElementById('payment-settings-form');
        const productListDiv = document.getElementById('product-list');

        function showSection(name, title, navLink) {
            Object.values(sections).forEach(s => s.classList.add('hidden'));
            Object.values(navLinks).forEach(l => l.classList.remove('active'));
            if (sections[name]) { sections[name].classList.remove('hidden'); navLink.classList.add('active'); pageTitle.textContent = title; }
            sidebar.classList.remove('sidebar-open'); sidebarOverlay.classList.add('hidden');
        }
        navLinks.addProduct.addEventListener('click', (e) => { e.preventDefault(); showSection('addProduct', 'Add Product', navLinks.addProduct); });
        navLinks.manageProducts.addEventListener('click', (e) => { e.preventDefault(); showSection('manageProducts', 'Manage Products', navLinks.manageProducts); });
        navLinks.paymentSettings.addEventListener('click', (e) => { e.preventDefault(); showSection('paymentSettings', 'QR & UPI Settings', navLinks.paymentSettings); });

        function toggleSidebar() { sidebar.classList.toggle('sidebar-open'); sidebarOverlay.classList.toggle('hidden'); }
        document.getElementById('menu-btn').addEventListener('click', toggleSidebar);
        document.getElementById('close-menu-btn').addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        function setupFileInput(id) {
            const input = document.getElementById(id);
            const txt = document.getElementById(`${id}-text`);
            const original = txt.textContent;
            input.addEventListener('change', () => {
                txt.textContent = input.files.length > 0 ? `${input.files.length} file(s) selected ✓` : original;
            });
        }
        setupFileInput('homeImage'); setupFileInput('featureImages'); setupFileInput('feedbackImages');

        async function uploadFiles(files) {
            const uploads = Array.from(files).map(file => {
                const fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                return fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: fd }).then(r => r.json());
            });
            const results = await Promise.all(uploads);
            return results.map(r => r.secure_url);
        }

        // --- MAIN INIT (config aane ke baad chalega) ---
        async function init() {
            let cfg;
            try { cfg = await getConfig(); }
            catch (err) { toast('Config load failed (firesdk.php)', false); console.error(err); return; }

            const COLLECTION = cfg.collection;                 // e.g. fkiphone / fksofa
            document.getElementById('store-badge').textContent = COLLECTION;

            const app = initializeApp(cfg.firebase);
            const db = getFirestore(app);

            // Payment settings har store ke liye alag -> settings/<collection>
            const paymentSettingsRef = doc(db, "settings", COLLECTION);

            // ---- Add product ----
            productForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.textContent = 'Uploading Images…'; btn.disabled = true;
                try {
                    const [homeImageUrls, featureImageUrls, feedbackImageUrls] = await Promise.all([
                        uploadFiles(document.getElementById('homeImage').files),
                        uploadFiles(document.getElementById('featureImages').files),
                        uploadFiles(document.getElementById('feedbackImages').files)
                    ]);
                    btn.textContent = 'Saving…';
                    const newProduct = {
                        title: document.getElementById('title').value,
                        price: Number(document.getElementById('price').value),
                        originalPrice: Number(document.getElementById('originalPrice').value),
                        discount: document.getElementById('discount').value,
                        homeImage: homeImageUrls[0] || '',
                        featureImages: featureImageUrls || [],
                        feedbackImages: feedbackImageUrls || [],
                        createdAt: serverTimestamp()
                    };
                    await addDoc(collection(db, COLLECTION), newProduct);
                    productForm.reset();
                    document.getElementById('homeImage-text').textContent = 'Tap to choose home image';
                    document.getElementById('featureImages-text').textContent = 'Tap to choose multiple images';
                    document.getElementById('feedbackImages-text').textContent = 'Tap to choose multiple images';
                    toast('Product added successfully!');
                } catch (err) {
                    console.error(err);
                    toast('Failed to add product', false);
                } finally {
                    btn.textContent = 'Save Product'; btn.disabled = false;
                }
            });

            // ---- Live product list (crash-safe, JS side sort) ----
            onSnapshot(query(collection(db, COLLECTION)), (snapshot) => {
                if (snapshot.empty) { productListDiv.innerHTML = '<p class="text-slate-500">No products found. Add one!</p>'; return; }
                const items = [];
                snapshot.forEach(d => items.push({ id: d.id, p: d.data() }));
                items.sort((a, b) => (b.p.createdAt?.seconds || 0) - (a.p.createdAt?.seconds || 0));
                productListDiv.innerHTML = items.map(({ id, p }) => `
                    <div class="flex items-center justify-between gap-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
                        <div class="flex items-center gap-3 min-w-0">
                            <img src="${p.homeImage}" class="w-14 h-14 flex-shrink-0 object-contain rounded-lg bg-white p-1 border" loading="lazy">
                            <div class="min-w-0">
                                <p class="font-semibold text-slate-800 truncate">${p.title}</p>
                                <p class="text-xs text-slate-500">₹${p.price} <span class="line-through">₹${p.originalPrice}</span> · ${p.discount}</p>
                            </div>
                        </div>
                        <button data-id="${id}" class="delete-btn flex-shrink-0 bg-red-500 text-white text-sm py-2 px-3 rounded-lg hover:bg-red-600 transition">Delete</button>
                    </div>
                `).join('');
            });

            productListDiv.addEventListener('click', async (e) => {
                const btn = e.target.closest('.delete-btn');
                if (!btn) return;
                if (!confirm('Delete this product?')) return;
                try { await deleteDoc(doc(db, COLLECTION, btn.getAttribute('data-id'))); toast('Product deleted'); }
                catch (err) { console.error(err); toast('Delete failed', false); }
            });

            // ---- Payment settings ----
            getDoc(paymentSettingsRef).then(snap => {
                if (snap.exists()) {
                    const s = snap.data();
                    document.getElementById('payeeName').value = s.payeeName || '';
                    document.getElementById('upiId').value = s.upiId || '';
                    document.getElementById('trCode').value = s.trCode || '';
                }
            });

            paymentForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.textContent = 'Saving…'; btn.disabled = true;
                try {
                    await setDoc(paymentSettingsRef, {
                        payeeName: document.getElementById('payeeName').value,
                        upiId: document.getElementById('upiId').value,
                        trCode: document.getElementById('trCode').value
                    });
                    toast('Payment settings saved!');
                } catch (err) { console.error(err); toast('Failed to save settings', false); }
                finally { btn.textContent = 'Save Payment Settings'; btn.disabled = false; }
            });
        }

        init();
    </script>
</body>
</html>
